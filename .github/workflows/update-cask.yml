name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update cask
        run: |
          sed -i "s/version \".*\"/version \"${{ github.event.client_payload.version }}\"/" Casks/zailimits.rb
          sed -i "s/sha256 \".*\"/sha256 \"${{ github.event.client_payload.sha256 }}\"/" Casks/zailimits.rb

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/zailimits.rb
          git commit -m "Update zailimits to v${{ github.event.client_payload.version }}"
          git push
